<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vurdering av habilitet – Forsvaret</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap');

:root {
  --green-dark: #2f3e2c;
  --green-mid: #4b5d3a;
  --green-light: #dfe6d8;
  --sand: #c9b88a;
  --white: #ffffff;
  --text: #1d261b;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--green-light);
  color: var(--text);
  margin: 0;
  padding: 0;
}

header {
  background: var(--green-dark);
  color: var(--white);
  padding: 30px 20px;
  text-align: center;
  border-bottom: 5px solid var(--sand);
}

header img {
  height: 110px;
  margin-bottom: 20px;
}

.container {
  max-width: 900px;
  margin: 40px auto;
  background: var(--white);
  padding: 40px;
  border-radius: 10px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

h1, h2 {
  color: var(--green-mid);
  margin-top: 0;
}

.section {
  margin-bottom: 40px;
}

label {
  font-weight: 600;
  display: block;
  margin-bottom: 8px;
}

input[type="text"],
input[type="date"],
textarea,
select {
  width: 100%;
  padding: 12px;
  border: 1px solid var(--green-light);
  border-radius: 6px;
  margin-bottom: 20px;
  font-size: 16px;
}

textarea {
  height: 120px;
  resize: vertical;
}

.print-btn {
  background: var(--green-mid);
  color: var(--white);
  padding: 14px 24px;
  border: none;
  border-radius: 6px;
  font-size: 18px;
  cursor: pointer;
  margin-top: 20px;
}

.print-btn:hover {
  background: var(--green-dark);
}

@media print {
  .print-btn {
    display: none;
  }
  body {
    background: white;
  }
  .container {
    box-shadow: none;
  }
}
</style>
</head>

<body>

<header>
  <img src="forsvaret-logo.png" alt="Forsvarets logo">
  <h1>Vurdering av habilitet</h1>
  <p>Forsvaret</p>
</header>

<div class="container">

  <div class="section">
    <h2>1. Personopplysninger</h2>

    <label>Navn</label>
    <input type="text">

    <label>Stilling / rolle</label>
    <input type="text">

    <label>Dato</label>
    <input type="date">
  </div>

  <div class="section">
    <h2>2. Beskrivelse av situasjonen</h2>
    <label>Beskriv saken eller situasjonen der habilitet vurderes</label>
    <textarea></textarea>
  </div>

  <div class="section">
    <h2>3. Mulige bindinger</h2>

    <label>Har du personlige, økonomiske eller andre relasjoner som kan påvirke habiliteten?</label>
    <select>
      <option>Nei</option>
      <option>Ja</option>
    </select>

    <label>Hvis ja, beskriv forholdet</label>
    <textarea></textarea>
  </div>

  <div class="section">
    <h2>4. Egen vurdering</h2>
    <label>Vurder selv om du er habil i denne saken</label>
    <textarea></textarea>
  </div>

  <div class="section">
    <h2>5. Faglig vurdering (fylles ut av leder)</h2>
    <label>Vurdering av habilitet</label>
    <textarea></textarea>

    <label>Konklusjon</label>
    <select>
      <option>Personen anses habil</option>
      <option>Personen anses inhabil</option>
    </select>
  </div>

  <button class="print-btn" onclick="window.print()">Skriv ut skjema</button>

</div>

</body>
</html>
